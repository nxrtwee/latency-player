name: Release

# Builds all three targets and publishes them to a GitHub Release.
# Trigger: push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# or run manually from the Actions tab.
#
#   • Windows  -> NSIS installer + portable .exe (electron-builder, unsigned)
#   • Android  -> debug .apk (Capacitor + Gradle, installs directly)
#   • iOS      -> unsigned .ipa (Capacitor + xcodebuild; sign at sideload time)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- Windows ---
  desktop-win:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm ci
      - name: Build installer (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # --publish never: a tag build otherwise makes electron-builder try to
        # publish to GitHub itself (needs GH_TOKEN); the separate publish job does
        # the release upload.
        run: npm run dist:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: |
            release/*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------- Android ---
  android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Install root deps
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci
      - name: Build mobile web bundle
        run: npm run build:mobile
      - name: Install Capacitor (mobile/)
        working-directory: mobile
        run: npm ci
      - name: Scaffold + sync Android project
        working-directory: mobile
        run: |
          npx cap add android
          npx cap sync android
      - name: Generate app icons
        working-directory: mobile
        run: |
          cp assets/appicon-source.png assets/icon.png
          npx @capacitor/assets generate --android \
            --iconBackgroundColor '#07070c' --iconBackgroundColorDark '#07070c'
      - name: Apply native patches (permissions)
        working-directory: mobile
        run: bash scripts/patch-android.sh
      - name: Build debug APK
        working-directory: mobile/android
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug
          mkdir -p ../../out-apk
          cp app/build/outputs/apk/debug/app-debug.apk ../../out-apk/Latency.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: out-apk/Latency.apk
          if-no-files-found: error

  # -------------------------------------------------------------------- iOS ---
  ios-ipa:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install root deps
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci
      - name: Build mobile web bundle
        run: npm run build:mobile
      - name: Install Capacitor (mobile/)
        working-directory: mobile
        run: npm ci
      - name: Scaffold + sync iOS project
        working-directory: mobile
        run: |
          npx cap add ios
          npx cap sync ios
      - name: Apply native patches (background audio)
        working-directory: mobile
        run: bash scripts/patch-ios.sh
      - name: Build unsigned .ipa
        working-directory: mobile/ios/App
        run: |
          set -euo pipefail
          if [ -d App.xcworkspace ]; then
            CONTAINER=(-workspace App.xcworkspace)
          else
            CONTAINER=(-project App.xcodeproj)
          fi
          xcodebuild \
            "${CONTAINER[@]}" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build
          APP="build/Build/Products/Release-iphoneos/App.app"
          [ -d "$APP" ] || { echo "ERROR: $APP not found"; exit 1; }
          rm -rf Payload Latency-unsigned.ipa
          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry Latency-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile/ios/App/Latency-unsigned.ipa
          if-no-files-found: error

  # ---------------------------------------------------------------- Publish ---
  publish:
    needs: [desktop-win, android-apk, ios-ipa]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/desktop-win/*.exe
            dist/android-apk/Latency.apk
            dist/ios-ipa/Latency-unsigned.ipa
          body: |
            ## Latency — кроссплатформенный медиаплеер

            **Скачать:**
            - **Windows** — `Latency-*-x64.exe` (установщик) или `*-portable.exe`
            - **Android** — `Latency.apk` (включите «установка из неизвестных источников»)
            - **iOS** — `Latency-unsigned.ipa` (подпишите своим Apple ID через AltStore/Sideloadly)

            > ⚠️ Плеер разрабатывался исключительно для десктопа. Мобильные порты
            > (особенно Android) сделаны «для галочки» — они рабочие, но местами
            > сырые. Эталонный опыт — на десктопе.
          fail_on_unmatched_files: true
