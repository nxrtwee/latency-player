name: Linux build (AppImage + rpm)

# Builds the Latency desktop target for Linux on a cloud Ubuntu runner. Electron
# runs natively on Linux, so this reuses the same renderer/main as Windows — only
# the electron-builder target differs. Produces two artifacts:
#
#   • AppImage -> universal, no install: `chmod +x` and run (easiest to test)
#   • rpm      -> native package for Fedora / RHEL (`sudo dnf install ./*.rpm`)
#
# Trigger it manually from the Actions tab (Run workflow), or it runs on push to
# main. Result: an artifact "desktop-linux" with the .AppImage and .rpm.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # electron-builder shells out to `rpmbuild` for the rpm target; it isn't
      # preinstalled on ubuntu-latest.
      - name: Install rpm tooling
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Install deps
        run: npm ci
      - name: Build (AppImage + rpm)
        env:
          # No code signing on Linux; keep electron-builder from probing for certs.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            release/*.AppImage
            release/*.rpm
          if-no-files-found: error
